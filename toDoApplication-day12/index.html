<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <h2>Todo App</h2>
        <input type="text" onkeyup="validate(event)" id="todo-input" placeholder="Enter task...">
        <input type="text" id="time-input" placeholder="Time (e.g. 2h)">

        <label>
            <input type="radio" name="priority" value="Urgent"> Urgent
        </label>
        <label>
            <input type="radio" name="priority" value="Non-Urgent" checked> Non-Urgent
        </label>

        <br><br>

        <button onclick="addTodo()">Add</button>
        <button onclick="sortTodos()">Sort A-Z</button>
        <input type="date" id="date-input">

        <ul id="todo-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
